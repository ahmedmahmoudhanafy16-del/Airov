<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wishlist | AIROV</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-header {
            padding: 10rem 5% 3rem;
            text-align: center;
        }
        .empty-state {
            text-align: center;
            padding: 5rem 0;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <nav id="navbar">
        <div class="logo">
            <a href="index.html">
                <img src="assets/logo.jpg" alt="AIROV Logo" style="height: 35px; width: auto;">
            </a>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="nav-menu" id="nav-menu">
            <ul class="nav-links">
                <li><a href="index.html#collections">Collections</a></li>
                <li><a href="index.html#about">Philosophy</a></li>
            </ul>
            <div class="nav-extra" style="display: flex; gap: 1.5rem; align-items: center;">
                <a href="account.html" class="icon-btn" style="color: var(--primary); font-size: 1.2rem; text-decoration: none;"><i class="far fa-user"></i></a>
                <button class="cart-toggle-btn" style="background: none; border: none; color: var(--primary); cursor: pointer; font-family: var(--font-sans); text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; display: flex; align-items: center; gap: 5px;">
                    Cart (<span id="cart-count">0</span>)
                </button>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <h1 style="font-family: var(--font-serif); font-size: 3rem;">Your Wishlist</h1>
        <p style="opacity: 0.6; margin-top: 1rem;">Items you've saved for later.</p>
    </div>

    <section class="section" style="padding-top: 0; min-height: 50vh;">
        <div class="collection-grid" id="wishlist-container" style="grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));">
            <!-- Populated via JS -->
        </div>
        <div id="empty-wishlist" class="empty-state" style="display: none;">
            <i class="far fa-heart" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <h3>Your wishlist is empty</h3>
            <p>Save items you like to your wishlist to review them later.</p>
            <a href="index.html#collections" class="btn-large" style="margin-top: 2rem; display: inline-block;">Continue Shopping</a>
        </div>
    </section>

    <!-- Cart Overlay & Panel -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-panel" id="cart-panel">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="close-cart" id="close-cart">✕</button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total</span>
                <span id="cart-total-price">EGP 0</span>
            </div>
            <button class="btn-large checkout-btn" style="width: 100%; text-align: center;" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wishlistContainer = document.getElementById('wishlist-container');
            const emptyState = document.getElementById('empty-wishlist');
            
            function renderWishlistPage() {
                wishlistContainer.innerHTML = '';
                if (wishlist.length === 0) {
                    emptyState.style.display = 'block';
                } else {
                    emptyState.style.display = 'none';
                    const items = productsCache.filter(p => wishlist.includes(p.id));
                    items.forEach(product => {
                        wishlistContainer.innerHTML += getProductCardHTML(product);
                    });
                }
            }

            renderWishlistPage();

            // Override global toggleWishlist just for this page to re-render instantly
            const originalToggle = window.toggleWishlist;
            window.toggleWishlist = function(productId) {
                originalToggle(productId);
                renderWishlistPage(); // Re-render to remove it from the grid
            };
        });
    </script>
</body>
</html>
